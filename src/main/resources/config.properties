###############################################
##### Okta API (OAuth 2.0 service app) #####
###############################################

# Okta org URL
orgUrl=https://{{tenant-url}}.okta.com
# Service app client ID
clientId={{client-id}}
# Public key ID (kid) from the service app
kid={{kid}}
# Private key PEM (use absolute path, or run java from the Jars directory)
privateKeyPath={{cert-path}}
oauthScopes=okta.users.manage

rateLimitMaxRetries=5
rateLimitRequestTimeoutSeconds=0
activateUsers=true
saltOrder=POSTFIX

###############################################
##### CSV file and user schema #####
###############################################
csvHeaderRow=firstName,lastName,email,login,value
csvLoginField=login
csvPasswordField=value
csvHeader.login=login
csvHeader.email=email
csvHeader.firstName=firstName
csvHeader.lastName=lastName

###############################################
##### Okta groups #####
###############################################
groupIDs=00gzg9d8ina1i2YTS1d7

###############################################
##### Concurrency #####
###############################################
numConsumers=10
bufferSize=10000